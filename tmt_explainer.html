<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAIL SeQR TMT — Production Process Explainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0B2447; --blue:#19376D; --gold:#F5A623; --red:#C8102E;
    --steel:#8DA9C4; --slag:#4A4E69; --white:#FFFFFF; --off:#F0F4F8;
    --hot:#FF6B2B; --glow:#FFD700;
  }

  body{background:var(--navy);color:var(--white);font-family:'Inter',sans-serif;overflow-x:hidden}

  /* ── HEADER ─────────────────────────────── */
  .hero{
    background:linear-gradient(160deg,#0B1D3A 0%,#0B2447 50%,#0D3476 100%);
    padding:28px 24px 20px;text-align:center;position:relative;overflow:hidden;
    border-bottom:3px solid var(--gold);
  }
  .hero::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 120%,rgba(245,166,35,.15) 0%,transparent 65%);
  }
  .sail-badge{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px}
  .sail-badge .lozenge{background:var(--red);color:#fff;font-size:10px;font-weight:800;
    padding:3px 10px;border-radius:3px;letter-spacing:.5px}
  .hero h1{font-family:'Bebas Neue',cursive;font-size:clamp(28px,6vw,52px);
    letter-spacing:2px;line-height:1;color:var(--white);margin-bottom:6px}
  .hero h1 span{color:var(--gold)}
  .hero p{font-size:13px;color:var(--steel);font-weight:500;letter-spacing:.3px}

  /* ── CONTROLS ────────────────────────────── */
  .controls{
    background:#071830;display:flex;align-items:center;gap:14px;
    padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.08);
    position:sticky;top:0;z-index:100;
  }
  .play-btn{
    background:var(--gold);color:var(--navy);border:none;border-radius:50%;
    width:42px;height:42px;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:.2s;font-weight:900;
  }
  .play-btn:hover{transform:scale(1.08)}
  .progress-wrap{flex:1;position:relative}
  .progress-track{
    height:5px;background:rgba(255,255,255,.12);border-radius:10px;
    cursor:pointer;position:relative;overflow:hidden;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--gold),var(--hot));
    border-radius:10px;width:0%;transition:width .4s linear;
  }
  .step-dots{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .step-dot{
    width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);
    cursor:pointer;transition:.2s;flex-shrink:0;
  }
  .step-dot.active{background:var(--gold);transform:scale(1.3)}
  .step-dot.done{background:rgba(245,166,35,.45)}
  .step-counter{font-size:12px;color:var(--steel);font-weight:700;white-space:nowrap}

  /* ── MAIN STAGE ──────────────────────────── */
  .stage{
    min-height:340px;display:flex;align-items:stretch;
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  /* Visual panel */
  .visual{
    flex:0 0 52%;background:#060F20;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;padding:24px;
  }
  .scene{width:100%;max-width:420px;display:none;animation:fadeIn .5s ease}
  .scene.active{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* Commentary panel */
  .commentary{
    flex:1;padding:28px 24px;background:linear-gradient(180deg,#0D1F3C 0%,#071830 100%);
    display:flex;flex-direction:column;justify-content:center;
  }
  .step-tag{
    font-size:10px;font-weight:800;letter-spacing:2px;color:var(--gold);
    margin-bottom:8px;text-transform:uppercase;
  }
  .step-title{font-size:clamp(17px,2.5vw,24px);font-weight:800;color:var(--white);
    margin-bottom:12px;line-height:1.2}
  .step-body{font-size:13px;color:#A8C0D6;line-height:1.75;margin-bottom:16px}
  .step-body strong{color:var(--white)}
  .key-facts{display:flex;flex-wrap:wrap;gap:8px}
  .fact-chip{
    background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.25);
    border-radius:20px;padding:5px 12px;font-size:11px;color:var(--gold);font-weight:600;
  }

  /* ── STEP STRIP ──────────────────────────── */
  .step-strip{
    display:flex;overflow-x:auto;gap:0;
    scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.06);
  }
  .step-strip::-webkit-scrollbar{display:none}
  .strip-step{
    flex:0 0 auto;padding:10px 16px;cursor:pointer;
    border-bottom:3px solid transparent;transition:.2s;
    text-align:center;min-width:80px;
  }
  .strip-step:hover{background:rgba(255,255,255,.04)}
  .strip-step.active{border-bottom-color:var(--gold);background:rgba(245,166,35,.06)}
  .strip-step .s-ico{font-size:20px;display:block;margin-bottom:3px}
  .strip-step .s-lbl{font-size:9.5px;font-weight:700;color:var(--steel);
    text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .strip-step.active .s-lbl{color:var(--gold)}

  /* ── SVG ANIMATIONS ──────────────────────── */
  .anim-wrap{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px}

  /* Blast Furnace */
  .furnace-body{animation:furnaceGlow 2s ease-in-out infinite alternate}
  @keyframes furnaceGlow{from{filter:drop-shadow(0 0 6px #FF6B2B)}to{filter:drop-shadow(0 0 18px #FFD700)}}
  .molten-flow{stroke-dasharray:60;stroke-dashoffset:60;animation:flowIn 1.5s ease-in-out infinite}
  @keyframes flowIn{to{stroke-dashoffset:0}}
  .flame{animation:flicker .4s ease-in-out infinite alternate;transform-origin:bottom center}
  @keyframes flicker{from{transform:scaleY(1) scaleX(1)}to{transform:scaleY(1.15) scaleX(.9)}}
  .bubble{animation:bubbleUp 2s ease-in-out infinite}
  @keyframes bubbleUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-30px);opacity:0}}
  .bubble:nth-child(2){animation-delay:.6s}
  .bubble:nth-child(3){animation-delay:1.2s}

  /* Rolling mill */
  .roller{animation:spin 1s linear infinite}
  .roller2{animation:spin 1s linear infinite reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  .billet-move{animation:moveRight 2s linear infinite}
  @keyframes moveRight{from{transform:translateX(-60px)}to{transform:translateX(60px)}}

  /* Quenching */
  .water-jet{animation:jetPulse .5s ease-in-out infinite alternate}
  @keyframes jetPulse{from{height:30px;opacity:.7}to{height:40px;opacity:1}}
  .steam{animation:steamRise 1.5s ease-out infinite}
  @keyframes steamRise{0%{transform:translateY(0);opacity:.8}100%{transform:translateY(-30px);opacity:0}}
  .bar-hot{animation:coolDown 3s ease-in-out infinite alternate}
  @keyframes coolDown{from{fill:#FF6B2B}to{fill:#C0C0C0}}

  /* QR scan */
  .scan-line{animation:scanMove 2s linear infinite}
  @keyframes scanMove{0%{transform:translateY(0)}50%{transform:translateY(60px)}100%{transform:translateY(0)}}
  .qr-pulse{animation:qrGlow 1.5s ease-in-out infinite alternate}
  @keyframes qrGlow{from{filter:drop-shadow(0 0 4px var(--gold))}to{filter:drop-shadow(0 0 12px var(--gold))}}

  /* Particles */
  .spark{animation:sparkFly var(--dur,.6s) ease-out infinite;transform-origin:center}
  @keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}
    100%{transform:translate(var(--tx,10px),var(--ty,-20px)) scale(0);opacity:0}}

  /* ── STEP NAV BUTTONS ────────────────────── */
  .nav-row{display:flex;justify-content:space-between;align-items:center;
    padding:14px 20px;background:#071830}
  .nav-btn-step{
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:var(--white);border-radius:8px;padding:9px 20px;font-size:12px;
    font-weight:700;cursor:pointer;transition:.2s;
  }
  .nav-btn-step:hover{background:rgba(245,166,35,.15);border-color:var(--gold);color:var(--gold)}
  .nav-btn-step.primary{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .nav-btn-step.primary:hover{background:#e8960f}
  .step-fraction{font-size:13px;color:var(--steel);font-weight:600}

  /* ── FOOTER ──────────────────────────────── */
  .explainer-footer{
    background:#040D1A;padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .explainer-footer p{font-size:11px;color:rgba(255,255,255,.3)}
  .seqr-badge-sm{
    background:var(--red);color:#fff;font-size:10px;font-weight:800;
    padding:3px 10px;border-radius:3px;
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="sail-badge">
    <span class="lozenge">SAIL</span>
    <span style="font-size:11px;color:var(--steel);font-weight:600;letter-spacing:1px">MAHARATNA · GOVT OF INDIA</span>
  </div>
  <h1>FROM IRON ORE<br>TO <span>SAIL SeQR</span> TMT</h1>

</div>

<!-- STICKY CONTROLS -->
<div class="controls">
  <button class="play-btn" id="playBtn" onclick="togglePlay()" title="Play / Pause">▶</button>
  <div class="progress-wrap">
    <div class="progress-track" onclick="seekClick(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="step-dots" id="stepDots"></div>
  </div>
  <div class="step-counter" id="stepCounter">Step 1 / 10</div>
</div>

<!-- STEP STRIP -->
<div class="step-strip" id="stepStrip"></div>

<!-- MAIN STAGE -->
<div class="stage">
  <div class="visual" id="visualPanel"></div>
  <div class="commentary" id="commentary"></div>
</div>

<!-- NAV ROW -->
<div class="nav-row">
  <button class="nav-btn-step" onclick="prevStep()">← Previous</button>
  <span class="step-fraction" id="fracLabel"></span>
  <button class="nav-btn-step primary" id="nextBtn" onclick="nextStep()">Next →</button>
</div>

<!-- FOOTER -->
<div class="explainer-footer">
  <p>SAIL SeQR TMT Bars — Fe 550D · IS 1786:2008 · BIS Certified · Ab Nischint Ho Jayein</p>
  <span class="seqr-badge-sm">SeQR Fe 550D</span>
</div>

<script>
// ══════════════════════════════════════════════

const STEPS = [
  {

    body:`SAIL's journey begins deep in the earth. <strong>Iron ore</strong> — the backbone of steel — is mined from SAIL's captive mines at Kiriburu, Meghahatuburu, Bolani and Chiria in Jharkhand & Odisha. These mines yield high-grade haematite ore with <strong>Fe content above 62%</strong>.\n\nUsing virgin iron ore (rather than scrap) is the defining advantage of primary steel — it ensures <strong>zero contamination</strong> from tramp elements like copper, tin or lead that weaken steel. This is the first reason SAIL SeQR is genuinely superior to secondary (EAF/IF-route) brands.`,

    facts:['Mould: water-cooled copper','Billet: 130×130 or 150×150mm','EMS for grain uniformity','Output: 150T/hour per strand'],

    icon:'⚙️', label:'Rolling Mill',
    tag:'Stage 7 — Bar Mill',
    title:'Bar Mill — Billets Rolled into Rebar Sections',

// ══════════════════════════════════════════════
// PLAYER ENGINE
// ══════════════════════════════════════════════
let currentStep = 0;
let isPlaying   = false;
let autoTimer   = null;
const AUTO_DELAY = 9000; // 9s per step

function buildStepStrip() {
  const strip = document.getElementById('stepStrip');
  strip.innerHTML = STEPS.map((s,i) =>
    `<div class="strip-step ${i===0?'active':''}" onclick="goStep(${i})">
      <span class="s-ico">${s.icon}</span>
      <span class="s-lbl">${s.label}</span>
    </div>`
  ).join('');
}

function buildDots() {
  const dotsEl = document.getElementById('stepDots');
  dotsEl.innerHTML = STEPS.map((_,i) =>
    `<div class="step-dot ${i===0?'active':''}" onclick="goStep(${i})" title="Step ${i+1}"></div>`
  ).join('');
}

function renderStep(idx) {
  const s = STEPS[idx];

  // Visual
  document.getElementById('visualPanel').innerHTML =
    `<div class="scene active">${getScene(s.visual)}</div>`;

  // Commentary
  document.getElementById('commentary').innerHTML = `
    <div class="step-tag">${s.tag}</div>
    <div class="step-title">${s.title}</div>
    <div class="step-body">${s.body.replace(/\n/g,'<br>')}</div>
    <div class="key-facts">${s.facts.map(f=>`<span class="fact-chip">⚡ ${f}</span>`).join('')}</div>
  `;

  // Controls
  document.getElementById('stepCounter').textContent = `Step ${idx+1} / ${STEPS.length}`;
  document.getElementById('fracLabel').textContent = `${idx+1} of ${STEPS.length}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/STEPS.length)*100}%`;

  // Strip
  document.querySelectorAll('.strip-step').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });

  // Dots
  document.querySelectorAll('.step-dot').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
    el.classList.toggle('done',i<idx);
  });

  // Next button text
  const nb = document.getElementById('nextBtn');
  nb.textContent = idx === STEPS.length-1 ? '↩ Restart' : 'Next →';

  // Scroll strip to active
  const activeStrip = document.querySelectorAll('.strip-step')[idx];
  if(activeStrip) activeStrip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function goStep(idx) {
  currentStep = Math.max(0, Math.min(STEPS.length-1, idx));
  renderStep(currentStep);
  if(isPlaying) resetTimer();
}

function nextStep() {
  if(currentStep >= STEPS.length-1) { goStep(0); return; }
  goStep(currentStep+1);
}

function prevStep() {
  goStep(currentStep-1);
}

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  if(isPlaying) { startTimer(); }
  else { clearTimeout(autoTimer); }
}

function startTimer() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    if(!isPlaying) return;
    if(currentStep >= STEPS.length-1) { currentStep=0; renderStep(0); }
    else { currentStep++; renderStep(currentStep); }
    startTimer();
  }, AUTO_DELAY);
}

function resetTimer() {
  clearTimeout(autoTimer);
  if(isPlaying) startTimer();
}

function seekClick(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const idx = Math.min(STEPS.length-1, Math.floor(pct * STEPS.length));
  goStep(idx);
}

// Init
buildStepStrip();
buildDots();
renderStep(0);
</script>
